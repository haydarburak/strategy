name: Run S&P 500 Strategy Daily

on:
  schedule:
    - cron: "0 21 * * 1-5"  # 9 PM UTC = 11 PM German time, Monday–Friday (after US market close)
  workflow_dispatch:          # Allow manual trigger from GitHub Actions tab

jobs:
  run_strategy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. checkout ──────────────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Python setup ───────────────────────────────────────────────────────
      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Verify Python Version
        run: |
          echo "Python version check:"
          python --version
          python -c "import sys; print(f'Full Python version: {sys.version}')"

      # ── 3. system deps (needed to compile some packages on ubuntu) ────────────
      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential

      # ── 4. upgrade core build tools before anything else ─────────────────────
      - name: Upgrade Core Build Tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade "setuptools>=70.0.0"
          python -m pip install --upgrade "wheel>=0.42.0"
          python -m pip install --upgrade "Cython>=3.0.0"

      # ── 5. install heavy numerical packages first (avoids build conflicts) ────
      - name: Install Core Packages
        run: |
          pip install "numpy>=2.2.6"
          pip install "pandas>=2.0.0,<3.0.0"
          pip install "numba>=0.59.0"

      # ── 6. remaining dependencies ─────────────────────────────────────────────
      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Verify Key Packages
        run: |
          echo "Installed packages:"
          pip list | grep -E "^(pandas|numpy|firebase|plotly|kaleido|tradingview|tvdatafeed)"

      # ── 7. credentials & environment variables ────────────────────────────────
      - name: Set Up Credentials and Environment Variables
        run: |
          # Decode Firebase credentials from base64 secret → write to file
          echo "${{ secrets.FIREBASE_CREDENTIALS_JSON_B64 }}" | base64 -d > firebase_credentials.json

          # Set FIREBASE_CREDENTIALS to the file path (same as main.py expects)
          echo "FIREBASE_CREDENTIALS=$(pwd)/firebase_credentials.json" >> $GITHUB_ENV

          # Telegram
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}"     >> $GITHUB_ENV
          echo "TELEGRAM_BOT_CHAT_ID=${{ secrets.TELEGRAM_BOT_CHAT_ID }}" >> $GITHUB_ENV

      # ── 8. verify Firebase credentials ────────────────────────────────────────
      - name: Verify Firebase Credentials
        run: |
          if [ -f "firebase_credentials.json" ]; then
            echo "✅ Firebase credentials file created successfully"
            echo "File size: $(stat -c%s firebase_credentials.json) bytes"
            if python -c "import json; json.load(open('firebase_credentials.json')); print('✅ Valid JSON')"; then
              :
            else
              echo "❌ Firebase credentials JSON is invalid"
              exit 1
            fi
          else
            echo "❌ Firebase credentials file not found"
            exit 1
          fi

      # ── 9. run the strategy ────────────────────────────────────────────────────
      - name: Run S&P 500 Strategy
        run: |
          echo "🚀 Starting S&P 500 strategy scan..."
          echo "📅 Running at: $(TZ='Europe/Berlin' date +'%H:%M German time (%A)')"
          python tradestrategy/run_sp500.py

      # ── 10. upload results as artifact ────────────────────────────────────────
      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sp500-results-${{ github.run_id }}
          path: tradestrategy/results/
          retention-days: 30

      # ── 11. cleanup sensitive files ────────────────────────────────────────────
      - name: Cleanup
        if: always()
        run: rm -f firebase_credentials.json
