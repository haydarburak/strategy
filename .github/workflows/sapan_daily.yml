name: Sapan Strateji — Günlük Sinyal Taraması

on:
  schedule:
    # Almanya 23:30 — yaz saati (CEST, UTC+2): Nisan–Ekim → 21:45 UTC
    - cron: "30 21 * 4,5,6,7,8,9,10 1-5"
    # Almanya 23:30 — kış saati (CET, UTC+1): Kasım–Mart → 22:45 UTC
    - cron: "30 22 * 1,2,3,11,12 1-5"

  workflow_dispatch:           # GitHub Actions sekmesinden manuel tetikleme
    inputs:
      lookback_days:
        description: "Sinyal arama penceresi (gün) — default: 3"
        required: false
        default: "3"
      markets:
        description: "Taranacak piyasalar: nasdaq,nyse,bist,xetr"
        required: false
        default: "nasdaq,nyse,bist,xetr"

jobs:
  scan:
    name: Sinyal Taraması
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────────────
      - name: Python 3.12 kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # ── 3. Build araçları ────────────────────────────────────────────────────
      - name: Build araçlarını güncelle
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade "setuptools>=70.0.0" "wheel>=0.42.0"

      # ── 4. Bağımlılıklar ─────────────────────────────────────────────────────
      - name: Sapan bağımlılıklarını yükle
        run: pip install -r sapanalerts/requirements.txt

      # ── 5. Ortam değişkenleri ────────────────────────────────────────────────
      - name: Ortam değişkenlerini ayarla
        run: |
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}"     >> $GITHUB_ENV
          echo "TELEGRAM_BOT_CHAT_ID=${{ secrets.TELEGRAM_BOT_CHAT_ID }}" >> $GITHUB_ENV
          echo "LOOKBACK_DAYS=${{ github.event.inputs.lookback_days || '3' }}"    >> $GITHUB_ENV
          echo "MARKETS=${{ github.event.inputs.markets || 'nasdaq,nyse,bist,xetr' }}" >> $GITHUB_ENV

      # ── 6. Tarama ────────────────────────────────────────────────────────────
      - name: Sapan Strateji Taraması Çalıştır
        run: |
          echo "🚀 Tarama başlıyor — $(TZ='America/New_York' date +'%H:%M ET (%A)')"
          python -m sapanalerts.run

      # ── 7. Artifact ──────────────────────────────────────────────────────────
      - name: Log artifact yükle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sapan-run-${{ github.run_id }}
          path: "*.log"
          retention-days: 14
          if-no-files-found: ignore
